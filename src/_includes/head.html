<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

<!-- SEO Meta Tags -->
<title>{{ site.title }}</title>
<meta name="description" content="{{ description or site.description }}">
<meta name="author" content="{{ site.author }}">
<meta name="robots" content="index, follow">

<!-- Open Graph Meta Tags -->
<meta property="og:title" content="{{ title }} | {{ site.title }}">
<meta property="og:description" content="{{ description or site.description }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ site.url }}/{{ page.fileSlug }}.html">
<meta property="og:image" content="{{ ogImage or site.ogImage }}">
<meta property="og:site_name" content="Abrindo Portas">
<meta property="og:locale" content="pt_BR">

<!-- Twitter Card Meta Tags -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ title }} | {{ site.title }}">
<meta name="twitter:description" content="{{ description or site.description }}">
<meta name="twitter:image" content="{{ ogImage or site.ogImage }}">
<meta name="twitter:creator" content="@EdirFennder">

<!-- Favicon -->
<link rel="icon" type="image/png" href="/assets/favicon.webp" sizes="32x32" />
<link rel="icon" type="image/png" href="/assets/favicon.webp" sizes="16x16" />
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
<meta name="theme-color" content="#0ea5e9">

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
    tailwind.config = {
        darkMode: 'class',
        theme: {
            extend: {
                colors: {
                    brand: { 
                        primary: '#3b82f6', 
                        secondary: '#1e40af', 
                        accent: '#06b6d4',
                        blue: '#0ea5e9',
                        dark: '#1e293b', 
                        light: '#f8fafc',
                        muted: '#64748b'
                    },
                    'light-bg': '#f8fafc',
                    'dark-bg': '#0f172a',
                    'dark-card': '#1e293b'
                },
                fontFamily: { 
                    sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    mono: ['JetBrains Mono', 'monospace']
                },
                animation: {
                    'float': 'float 6s ease-in-out infinite',
                    'blob': 'blob 7s infinite',
                    'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    'slide-up': 'slideUp 0.6s ease-out',
                    'fade-in': 'fadeIn 0.8s ease-out',
                    'glow': 'glow 2s ease-in-out infinite alternate',
                },
                keyframes: {
                    float: {
                        '0%, 100%': { transform: 'translateY(0)' },
                        '50%': { transform: 'translateY(-20px)' },
                    },
                    blob: {
                        '0%': { transform: 'translate(0px, 0px) scale(1)' },
                        '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                        '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                        '100%': { transform: 'translate(0px, 0px) scale(1)' },
                    },
                    slideUp: {
                        '0%': { opacity: '0', transform: 'translateY(30px)' },
                        '100%': { opacity: '1', transform: 'translateY(0)' },
                    },
                    fadeIn: {
                        '0%': { opacity: '0' },
                        '100%': { opacity: '1' },
                    },
                    glow: {
                        '0%': { boxShadow: '0 0 20px rgba(59, 130, 246, 0.5)' },
                        '100%': { boxShadow: '0 0 30px rgba(59, 130, 246, 0.8)' },
                    }
                }
            }
        }
    }
</script>

<!-- CSS -->
<link rel="stylesheet" href="/css/styles-optimized.css">

<!-- Fontes -->
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.analyticsId }}"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.analyticsId }}');
</script>

<!-- Dark mode init -->
<script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    } else {
        document.documentElement.classList.remove('dark');
    }
    function toggleDarkMode() {
        if (document.documentElement.classList.contains('dark')) {
            document.documentElement.classList.remove('dark');
            localStorage.theme = 'light';
        } else {
            document.documentElement.classList.add('dark');
            localStorage.theme = 'dark';
        }
    }
</script>
